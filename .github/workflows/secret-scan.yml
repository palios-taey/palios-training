# secret-scan — full-history gitleaks scan, required check before merge.
# Self-contained (installs the gitleaks binary; no marketplace action / license
# dependency). Uses .gitleaks.toml in the repo root (default ruleset + documented
# false-positive allowlist). Fails the check on any unallowlisted finding.
name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — a .gitignore does not untrack a committed secret
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full git history
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
